name: CI

# Lint + test on every push to main and on PRs targeting main.
# "Lint" here is the project's static gate: there is no separate linter — a clean
# `tsc --strict` build is the check (see CLAUDE.md). The test step runs the
# dependency-free unit suite on Node's built-in test runner. Neither step needs a
# device, so the platform-agnostic core is fully covered in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Verified locally on 20; 22 is the current LTS. Bump/extend as needed
      # (the package targets Node >= 18).
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript strict type-check)
        run: npm run build

      # `test:ci` runs the suite through two reporters at once: `spec` to stdout
      # (the readable ✔/✖ list you see in this log) and a small custom reporter
      # (scripts/github-test-summary.mjs) to test-results/summary.md.
      - name: Test (unit suite)
        run: npm run test:ci
        env:
          TEST_SUMMARY_LABEL: Node ${{ matrix.node-version }}

      # Surface that markdown summary on the run's page (the "Summary" tab), so a
      # formatted test list is one click away instead of buried in the log.
      # `always()` so it still reports when tests fail — that is when it matters.
      - name: Publish test summary
        if: always()
        run: |
          if [ -f test-results/summary.md ]; then
            cat test-results/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No test summary produced (the suite may have failed to compile)." >> "$GITHUB_STEP_SUMMARY"
          fi
